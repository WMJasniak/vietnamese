name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install JS engine (QuickJS) for the harness
        run: pip install quickjs
      - name: Run logic + data-integrity tests
        run: python tests/run_tests.py
